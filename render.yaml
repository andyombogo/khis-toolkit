services:
  - type: web
    name: khis-toolkit-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboard.app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: KHIS_DATA_MODE
        value: offline_demo
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DHIS2_BASE_URL
        value: https://demos.dhis2.org/hmis_dev
      - key: DHIS2_USERNAME
        value: demo_en
      - key: DHIS2_PASSWORD
        value: District1#
