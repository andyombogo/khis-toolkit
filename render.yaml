services:
  - type: web
    name: khis-toolkit
    env: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: gunicorn dashboard.app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DHIS2_BASE_URL
        sync: false
      - key: DHIS2_USERNAME
        sync: false
      - key: DHIS2_PASSWORD
        sync: false
